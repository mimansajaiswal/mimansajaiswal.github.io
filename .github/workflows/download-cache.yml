name: Download and Upload Cache

on:
  workflow_dispatch:
    inputs:
      cache_key:
        description: 'Cache key to restore'
        required: true
        type: string

jobs:
  download-upload-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cache (with prefix)
        id: cache
        uses: actions/cache@v4
        with:
          path: ./restored-cache
          key: constants-config-6aeccd0b58dc0b20b6986290c1e85aa4277953309679d193e99ba56d8200ba4b
          restore-keys: |
            constants-config-

      - name: List restored cache contents
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          echo "Cache restored with key: ${{ github.event.inputs.cache_key }}"
          ls -R ./restored-cache || true

      - name: Upload restored cache as artifact
        if: steps.cache.outputs.cache-hit == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: restored-cache-${{ github.event.inputs.cache_key }}
          path: ./restored-cache

      - name: No cache found
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo "No cache found for key ${{ github.event.inputs.cache_key }}"
